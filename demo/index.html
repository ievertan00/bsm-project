<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Data Import</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .upload-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .status-msg { margin-top: 20px; display: none; }
        .login-container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #mainContent { display: none; }
    </style>
</head>
<body>

<!-- 登录界面 -->
<div id="loginContainer" class="login-container">
    <h2 class="text-center mb-4">系统登录</h2>
    <div class="mb-3">
        <label for="username" class="form-label">用户名</label>
        <input type="text" class="form-control" id="username" placeholder="请输入用户名">
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">密码</label>
        <input type="password" class="form-control" id="password" placeholder="请输入密码">
    </div>
    <div class="d-grid">
        <button class="btn btn-primary" type="button" id="loginBtn">登录</button>
    </div>
    <div id="loginStatus" class="alert mt-3" style="display: none;"></div>
</div>

<!-- 主界面 -->
<div id="mainContent" class="container">
    <div class="upload-container">
        <h2 class="text-center mb-4">Data Import Center</h2>
        
        <div class="mb-3">
            <label for="schemaType" class="form-label">Select Schema Type</label>
            <select class="form-select" id="schemaType">
                <option value="business_data">Business Data (Loan/Guarantee)</option>
                <option value="qcc_industry">QCC Industry Category</option>
                <option value="qcc_tech">QCC Tech Honors</option>
                <option value="qyjh_list">QYJH List</option>
            </select>
        </div>

        <div id="snapshotInputs" class="row mb-3">
            <div class="col">
                <label for="snapshotYear" class="form-label">Snapshot Year</label>
                <input type="number" class="form-control" id="snapshotYear" placeholder="2026">
            </div>
            <div class="col">
                <label for="snapshotMonth" class="form-label">Snapshot Month</label>
                <input type="number" class="form-control" id="snapshotMonth" placeholder="2">
            </div>
        </div>

        <div class="mb-3">
            <label for="fileInput" class="form-label">Choose Excel File (.xlsx, .xls)</label>
            <input class="form-control" type="file" id="fileInput" accept=".xlsx, .xls" multiple>
        </div>

        <div class="d-grid gap-2"  style="margin-bottom: 2.5px; margin-bottom: 2.5px; padding: 10px;">
            <button class="btn btn-primary" type="button" id="uploadBtn">Upload and Import</button>
        </div>

        <div class="d-grid gap-2"  style="margin-bottom: 2.5px; margin-bottom: 2.5px; padding: 10px;">
            <button class="btn btn-primary" type="button" id="bulkUploadBtn">Bulk Upload and Import</button>
        </div>

        <div class="d-grid gap-2" style="margin-bottom: 2.5px; margin-bottom: 2.5px; padding: 10px;">
            <button class="btn btn-outline-primary d-flex align-items-center justify-content-center gap-2" type="button" id="syncBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-repeat" viewBox="0 0 16 16">
                    <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-1.1 2c.134.44.2.908.2 1.385a4.5 4.5 0 0 1-9 0 4.5 4.5 0 0 1 3-4.244V6.22a5.5 5.5 0 0 0-5 5.165 5.5 5.5 0 0 0 11 0 5.5 5.5 0 0 0-.474-2.253l1.107-.442z"/>
                    <path d="M4.466 9H.534a.25.25 0 0 0-.192.41l1.966 2.36a.25.25 0 0 0 .384 0l1.966-2.36A.25.25 0 0 0 4.466 9z"/>
                </svg>
                Sync Master Data
            </button>
        </div>

        <div class="d-grid gap-2" style="margin-bottom: 2.5px; margin-bottom: 2.5px; padding: 10px;">
            <button class="btn btn-info d-flex align-items-center justify-content-center gap-2" type="button" id="statsBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-bar-chart" viewBox="0 0 16 16">
                    <path d="M4 11H2v3h2v-3zm5-4H7v7h2V7zm5-5h-2v12h2V2zm-2-1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1h-2zM6 7a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V7zm-5 4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1v-3z"/>
                </svg>
                View Statistics
            </button>
        </div>

        <div class="d-grid gap-2" style="margin-bottom: 2.5px; margin-bottom: 2.5px; padding: 10px;">
            <button class="btn btn-secondary d-flex align-items-center justify-content-center gap-2" type="button" id="statusBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-table" viewBox="0 0 16 16">
                    <path d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2zm15 2h-4v3h4V4zm0 4h-4v3h4V8zm0 4h-4v3h4v-3zM5 4H1v3h4V4zm0 4H1v3h4V8zm0 4H1v3h4v-3zm6 0H7v3h4v-3zm0-4H7v3h4V8zm0-4H7v3h4V4z"/>
                </svg>
                View Data Status
            </button>
        </div>

        <div class="d-grid gap-2" style="margin-bottom: 2.5px; margin-bottom: 2.5px; padding: 10px;">
            <button class="btn btn-outline-danger d-flex align-items-center justify-content-center gap-2" type="button" id="deleteBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash3" viewBox="0 0 16 16">
                    <path d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H2.506a.58.58 0 0 0-.01 0H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1h-.995a.59.59 0 0 0-.01 0zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5"/>
                </svg>
                Delete Snapshot Data
            </button>
        </div>

        <div id="statusMsg" class="alert status-msg"></div>
        
        <div id="loading" class="text-center mt-3" style="display: none;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Processing file, please wait...</p>
        </div>
    </div>

    <div id="statisticsContainer" class="mt-5"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="get_statistics.js"></script>
<script>
    document.getElementById('statsBtn').addEventListener('click', () => {
        const year = document.getElementById('snapshotYear').value;
        const month = document.getElementById('snapshotMonth').value;
        if (!year || !month) {
            showStatus('Please enter Snapshot Year and Month to view statistics.', 'alert-warning');
            return;
        }
        fetchStatistics(year, month);
    });

    document.getElementById('statusBtn').addEventListener('click', async () => {
        const year = document.getElementById('snapshotYear').value;
        const month = document.getElementById('snapshotMonth').value;
        if (!year || !month) {
            showStatus('Please enter Snapshot Year and Month to view data status.', 'alert-warning');
            return;
        }

        const container = document.getElementById('statisticsContainer');
        container.innerHTML = '<div class="text-center my-4"><div class="spinner-border text-primary" role="status"></div><p>Loading data status...</p></div>';

        try {
            const response = await fetch(`/data_status/?snapshot_year=${year}&snapshot_month=${month}`);
            
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.detail || 'Server error');
            }

            const data = await response.json();

            if (data.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No data found for this snapshot.</div>';
                return;
            }

            let html = `<div class="d-flex justify-content-between align-items-center mb-3">
                <h3>Data Status - ${year}/${month} (${data.length} records)</h3>
                <button class="btn btn-success d-flex align-items-center gap-2" type="button" id="exportBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-file-earmark-excel" viewBox="0 0 16 16">
                        <path d="M5.884 6.68a.5.5 0 1 0-.768.64L7.349 10l-2.233 2.68a.5.5 0 0 0 .768.64L8 10.781l2.117 2.54a.5.5 0 0 0 .768-.641L8.651 10l2.233-2.68a.5.5 0 0 0-.768-.64L8 9.219l-2.116-2.54z"/>
                        <path d="M14 14V4.5L9.5 0H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2zM9.5 3A1.5 1.5 0 0 0 11 4.5h2V14a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h4v2.5z"/>
                    </svg>
                    Export to Excel
                </button>
            </div>`;
            
            html += '<div class="table-responsive" style="max-height: 600px; overflow-y: auto;">';
            html += '<table class="table table-sm table-striped table-bordered mt-3"><thead><tr>';
            
            // Get columns from first record, excluding internal or redundant ones if needed
            const cols = Object.keys(data[0]);
            cols.forEach(col => {
                html += `<th>${col}</th>`;
            });
            html += '</tr></thead><tbody>';

            data.forEach(row => {
                html += '<tr>';
                cols.forEach(col => {
                    let val = row[col];
                    if (val === null) val = '';
                    // Limit string length for display
                    if (typeof val === 'string' && val.length > 50) val = val.substring(0, 47) + '...';
                    html += `<td>${val}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
            
            // Re-attach export listener to the new button
            document.getElementById('exportBtn').addEventListener('click', () => exportDataStatus(year, month));

        } catch (error) {
            console.error('Data status error:', error);
            showStatus(`Failed to fetch data status: ${error.message}`, 'alert-danger');
            container.innerHTML = '';
        }
    });

    async function exportDataStatus(year, month) {
        try {
            const response = await fetch(`/export_data_status/?snapshot_year=${year}&snapshot_month=${month}`);
            
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.detail || 'Server error');
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `data_status_${year}_${month}.xlsx`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        } catch (error) {
            console.error('Export error:', error);
            showStatus(`Failed to export data status: ${error.message}`, 'alert-danger');
        }
    }

    document.getElementById('uploadBtn').addEventListener('click', async () => {
        const fileInput = document.getElementById('fileInput');
        const schemaType = document.getElementById('schemaType').value;
        const snapshotYear = document.getElementById('snapshotYear').value;
        const snapshotMonth = document.getElementById('snapshotMonth').value;
        const statusMsg = document.getElementById('statusMsg');
        const loading = document.getElementById('loading');
        const uploadBtn = document.getElementById('uploadBtn');

        if (!fileInput.files[0]) {
            showStatus('Please select a file first.', 'alert-danger');
            return;
        }

        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        // Reset UI
        statusMsg.style.display = 'none';
        loading.style.display = 'block';
        uploadBtn.disabled = true;

        let url_import = `/import/?schema_type=${schemaType}`;
        if (snapshotYear) url_import += `&snapshot_year=${snapshotYear}`;
        if (snapshotMonth) url_import += `&snapshot_month=${snapshotMonth}`;

        try {
            const response = await fetch(url_import, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok) {
                showStatus(result.detail, 'alert-success');
                fileInput.value = ''; // Clear file input on success
            } else {
                showStatus(`Error: ${result.detail || 'Upload failed'}`, 'alert-danger');
            }
        } catch (error) {
            showStatus(`Network error: ${error.message}`, 'alert-danger');
        } finally {
            loading.style.display = 'none';
            uploadBtn.disabled = false;
        }
    });

    document.getElementById('bulkUploadBtn').addEventListener('click', async () => {
        const fileInput = document.getElementById('fileInput');
        const statusMsg = document.getElementById('statusMsg');
        const loading = document.getElementById('loading');
        const bulkUploadBtn = document.getElementById('bulkUploadBtn');

        // Reset UI
        statusMsg.style.display = 'none';
        loading.style.display = 'block';
        bulkUploadBtn.disabled = true;

        const formData = new FormData();
        const snapshotYears = []; // 存储所有文件的年份数组
        const snapshotMonths = []; // 存储所有文件的月份数组

        for (let i = 0; i < fileInput.files.length; i++) {
            const file = fileInput.files[i];
            const filename = file.name.toLowerCase();

            if (!filename.endsWith('.xlsx') && !filename.endsWith('.xls')) {
                showStatus(`Invalid file type: ${file.name}. Only .xlsx and .xls files are allowed.`, 'alert-danger');
                loading.style.display = 'none';
                bulkUploadBtn.disabled = false;
                return;
            }
            
            const fileNamePattern = /^智融担保项目明细.*?(\d{4})年(\d{1,2})月\.xlsx?$/;
            const match = fileNamePattern.exec(file.name);

            if (match) {
                snapshotYears.push(match[1]); 
                snapshotMonths.push(match[2]); 
            } else {
                showStatus(`Filename does not match required pattern: ${file.name}`, 'alert-danger');
                loading.style.display = 'none';
                bulkUploadBtn.disabled = false;
                return;
            }

            console.log(`Processing file: ${file.name}, Snapshot Year: ${snapshotYears}, Snapshot Month: ${snapshotMonths}`);
        }

        try {
            const files = fileInput.files;
            for (const file of files) {
            formData.append('files', file);
        }

        snapshotYears.forEach(year => formData.append('snapshot_years', year));
        snapshotMonths.forEach(month => formData.append('snapshot_months', month)); 
        } 

        catch (error) {
            showStatus(`Error: ${error.message}`, 'alert-danger');
            loading.style.display = 'none';
            bulkUploadBtn.disabled = false;
            return;
        }

        let url_bulk_import = `/bulk_import/?schema_type=business_data`;

        try {
            const response = await fetch(url_bulk_import, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (response.ok) {
                showStatus(result.detail, 'alert-success');
            } else {
                showStatus(`Error: ${result.detail || 'Bulk upload failed'}`, 'alert-danger');
            }
        } catch (error) {
            showStatus(`Network error: ${error.message}`, 'alert-danger');
        } finally {
            loading.style.display = 'none';
            bulkUploadBtn.disabled = false;
        }
    });

    document.getElementById('syncBtn').addEventListener('click', async () => {
        const statusMsg = document.getElementById('statusMsg');
        const loading = document.getElementById('loading');
        const syncBtn = document.getElementById('syncBtn');

        // Reset UI
        statusMsg.style.display = 'none';
        loading.style.display = 'block';
        syncBtn.disabled = true;

        try {
            const response = await fetch('/sync/', {
                method: 'POST'
            });

            const result = await response.json();

            if (response.ok) {
                showStatus(result.detail, 'alert-success');
            } else {
                showStatus(`Error: ${result.detail || 'Sync failed'}`, 'alert-danger');
            }
        } catch (error) {
            showStatus(`Network error: ${error.message}`, 'alert-danger');
        } finally {
            loading.style.display = 'none';
            syncBtn.disabled = false;
        }
    });

    document.getElementById('deleteBtn').addEventListener('click', async () => {
        const snapshotYear = document.getElementById('snapshotYear').value;
        const snapshotMonth = document.getElementById('snapshotMonth').value;
        const statusMsg = document.getElementById('statusMsg');
        const loading = document.getElementById('loading');
        const deleteBtn = document.getElementById('deleteBtn');

        if (!snapshotYear || !snapshotMonth) {
            showStatus('Please enter both Snapshot Year and Month.', 'alert-danger');
            return;
        }

        // Reset UI
        statusMsg.style.display = 'none';
        loading.style.display = 'block';
        deleteBtn.disabled = true;

        let url_delete = `/delete/?schema_type=business_data`;
        url_delete += `&snapshot_year=${snapshotYear}`;
        url_delete += `&snapshot_month=${snapshotMonth}`;

        try {
            const response = await fetch(url_delete, {
                method: 'DELETE'
            });

            const result = await response.json();

            if (response.ok) {
                showStatus(result.detail, 'alert-success');
            } else {
                showStatus(`Error: ${result.detail || 'Delete failed'}`, 'alert-danger');
            }
        } catch (error) {
            showStatus(`Network error: ${error.message}`, 'alert-danger');
        } finally {
            loading.style.display = 'none';
            deleteBtn.disabled = false;
        }
    });

    function showStatus(message, className) {
        const statusMsg = document.getElementById('statusMsg');
        statusMsg.innerText = message;
        statusMsg.className = `alert status-msg ${className}`;
        statusMsg.style.display = 'block';
    }

    // 认证相关
    let authCredentials = null;

    // 页面加载时检查是否有保存的凭证
    window.addEventListener('load', () => {
        const savedCredentials = localStorage.getItem('authCredentials');
        if (savedCredentials) {
            authCredentials = savedCredentials;
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        }
    });

    // 重写 fetch 函数，确保所有请求都添加认证头
    const originalFetch = window.fetch;
    window.fetch = function(url, options = {}) {
        if (authCredentials) {
            options.headers = {
                ...options.headers,
                'Authorization': `Basic ${authCredentials}`
            };
        }
        return originalFetch(url, options);
    };

    document.getElementById('loginBtn').addEventListener('click', () => {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        if (!username || !password) {
            showLoginStatus('请输入用户名和密码', 'alert-warning');
            return;
        }

        // 保存凭证用于后续请求
        authCredentials = btoa(`${username}:${password}`);
        
        // 测试凭证是否有效 - 使用简单请求测试
        fetch('/', {
            method: 'GET'
        })
        .then(response => {
            if (response.ok) {
                // 登录成功
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                localStorage.setItem('authCredentials', authCredentials);
            } else if (response.status === 401) {
                showLoginStatus('用户名或密码错误', 'alert-danger');
                authCredentials = null;
            } else {
                showLoginStatus(`登录失败：${response.status}`, 'alert-danger');
                authCredentials = null;
            }
        })
        .catch(error => {
            showLoginStatus(`登录失败：${error.message}`, 'alert-danger');
            authCredentials = null;
        });
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        authCredentials = null;
        localStorage.removeItem('authCredentials');
        document.getElementById('loginContainer').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    });

    function showLoginStatus(message, className) {
        const statusMsg = document.getElementById('loginStatus');
        statusMsg.innerText = message;
        statusMsg.className = `alert ${className}`;
        statusMsg.style.display = 'block';
    }
</script>

</body>
</html>
